bucket_definitions:
  by_org:
    parameters:
      - SELECT token_parameters.o AS org_id
    data:
      - SELECT id, org_id, slug, name, currency, timezone, status, created_at, updated_at
        FROM organizations
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, name, address, phone, email, timezone, status, created_at, updated_at
        FROM stores
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, store_id, name, status, created_at, updated_at
        FROM registers
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, name, permissions, is_system, created_at, updated_at
        FROM roles
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, role_id, name, email, phone, status, all_stores, created_at, updated_at
        FROM users
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, user_id, store_id, created_at
        FROM user_stores
        WHERE org_id = bucket.org_id
      - SELECT id, org_id, parent_id, name, sort_order, color, image_url, created_at, updated_at
        FROM categories
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, category_id, name, description, image_url, is_active, sort_order, created_at, updated_at
        FROM products
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, product_id, name, sku, barcode, price, cost_price,
               track_stock, is_active, sort_order, created_at, updated_at
        FROM product_variants
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, product_id, name, sort_order, created_at, updated_at
        FROM product_options
        WHERE org_id = bucket.org_id
      - SELECT id, org_id, option_id, value, sort_order, created_at, updated_at
        FROM product_option_values
        WHERE org_id = bucket.org_id
      - SELECT id, org_id, variant_id, option_value_id, created_at
        FROM product_variant_option_values
        WHERE org_id = bucket.org_id
      - SELECT id, org_id, product_id, variant_id, url, sort_order, created_at, updated_at
        FROM product_images
        WHERE org_id = bucket.org_id
      - SELECT id, org_id, name, rate, is_inclusive, is_default, created_at, updated_at
        FROM tax_rates
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, name, type, is_active, sort_order, created_at, updated_at
        FROM payment_methods
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, name, email, phone, notes, created_at, updated_at
        FROM customers
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, name, description, discount_type, discount_value, created_at, updated_at
        FROM customer_groups
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, group_id, customer_id, created_at
        FROM customer_group_members
        WHERE org_id = bucket.org_id
      - SELECT id, org_id, name, contact_name, email, phone, address, notes, created_at, updated_at
        FROM suppliers
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, store_id, user_id, po_number, supplier_name, status, notes,
               expected_at, received_at, created_at, updated_at
        FROM purchase_orders
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, purchase_order_id, variant_id, quantity_ordered,
               quantity_received, cost_price, created_at, updated_at
        FROM purchase_order_items
        WHERE org_id = bucket.org_id
      - SELECT id, org_id, store_id, variant_id, direction, quantity, movement_type,
               reference_type, reference_id, created_at
        FROM stock_movements
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, store_id, user_id, status, notes, completed_at,
               created_at, updated_at
        FROM stock_takes
        WHERE org_id = bucket.org_id AND deleted_at IS NULL
      - SELECT id, org_id, stock_take_id, variant_id, expected_qty, counted_qty,
               created_at, updated_at
        FROM stock_take_items
        WHERE org_id = bucket.org_id
