replication:
  connections:
    - type: postgresql
      uri: postgres://postgres:postgres@postgres:5432/genpos_dev
      sslmode: disable

storage:
  type: postgresql
  uri: postgres://postgres:postgres@postgres:5432/genpos_dev
  sslmode: disable

port: 8080

sync_rules:
  path: sync-rules.yaml

# Dev auth — must match POWERSYNC_JWT_SECRET from backend .env
# The key below is base64("my-dev-secret-key-for-jwt-signing")
client_auth:
  jwks:
    keys:
      - kty: oct
        k: "bXktZGV2LXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5n"
        alg: HS256
  audience:
    - powersync-dev

api:
  tokens:
    - powersync-dev-token

telemetry:
  disable_telemetry_sharing: true

system:
  logging:
    level: info
