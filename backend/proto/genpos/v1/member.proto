syntax = "proto3";

package genpos.v1;

option go_package = "github.com/genpick/genpos-mono/backend/gen/genpos/v1;genposv1";

import "google/protobuf/timestamp.proto";

// ----- MemberService ---------------------------------------------------------
service MemberService {
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse) {}
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse) {}
  rpc CreateMember(CreateMemberRequest) returns (CreateMemberResponse) {}
  rpc UpdateMember(UpdateMemberRequest) returns (UpdateMemberResponse) {}
  rpc DeleteMember(DeleteMemberRequest) returns (DeleteMemberResponse) {}
}

message Member {
  string                    id         = 1;
  string                    org_id     = 2;
  string                    name       = 3;
  string                    email      = 4;
  string                    phone      = 5;
  string                    role_id    = 6;
  string                    role_name  = 7;
  // "active" | "inactive" | "suspended"
  string                    status     = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message RoleOption {
  string id        = 1;
  string name      = 2;
  bool   is_system = 3;
}

message CreateMemberInput {
  string name     = 1;
  string email    = 2;
  string phone    = 3;
  string role_id  = 4;
  string password = 5;
}

message UpdateMemberInput {
  string name    = 1;
  string phone   = 2;
  string role_id = 3;
  string status  = 4;
}

message ListMembersRequest {}
message ListMembersResponse {
  repeated Member members = 1;
}

message ListRolesRequest {}
message ListRolesResponse {
  repeated RoleOption roles = 1;
}

message CreateMemberRequest { CreateMemberInput member = 1; }
message CreateMemberResponse { Member member = 1; }

message UpdateMemberRequest {
  string            id     = 1;
  UpdateMemberInput member = 2;
}
message UpdateMemberResponse { Member member = 1; }

message DeleteMemberRequest { string id = 1; }
message DeleteMemberResponse {}
