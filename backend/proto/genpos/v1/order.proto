syntax = "proto3";

package genpos.v1;

option go_package = "github.com/genpick/genpos-mono/backend/gen/genpos/v1;genposv1";

import "google/protobuf/timestamp.proto";

// ----- OrderService ----------------------------------------------------------
service OrderService {
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse) {}
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse) {}
  // CreateOrder accepts a completed order from a non-cloud channel (today: the
  // desk POS). Idempotent on (source, external_id) — resubmitting with the
  // same key returns the previously persisted order rather than creating a
  // duplicate. external_id is the client's local UUID.
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse) {}
}

message OrderSummary {
  string                    id              = 1;
  string                    order_number    = 2;
  string                    status          = 3;
  string                    subtotal        = 4;
  string                    tax_total       = 5;
  string                    discount_total  = 6;
  string                    total           = 7;
  string                    store_id        = 8;
  string                    store_name      = 9;
  string                    register_id     = 10;
  string                    user_id         = 11;
  string                    user_name       = 12;
  string                    customer_id     = 13;
  string                    customer_name   = 14;
  google.protobuf.Timestamp created_at      = 15;
  // pos | online_store | shopify | woocommerce | manual | import
  string                    source          = 16;
  string                    external_id     = 17;
}

message ListOrdersRequest {
  string                    store_id  = 1;
  google.protobuf.Timestamp date_from = 2;
  google.protobuf.Timestamp date_to   = 3;
}

message ListOrdersResponse {
  repeated OrderSummary orders = 1;
}

// ----- Order detail ----------------------------------------------------------
// One snapshot of a tax applied to a line item. Snapshot fields freeze the
// rate's identity at sale time -- editing the source tax_rate later does not
// change historical orders. is_compound is the snapshot of the tax_class_rate
// flag and reflects how this rate was computed (on the raw taxable_base, or
// on base + previously applied taxes).
message OrderLineItemTax {
  string id              = 1;
  int32  sequence        = 2;
  string tax_rate_id     = 3; // optional -- source rate may be deleted
  string name_snapshot   = 4;
  string rate_snapshot   = 5; // decimal string, fraction (e.g. "0.1000" = 10%)
  bool   is_inclusive    = 6;
  bool   is_compound     = 7;
  string taxable_base    = 8; // decimal string
  string amount          = 9; // decimal string
}

// One discount, promotion, fee, or comp applied to a line item. amount is
// signed: negative for discount and comp, positive for fee and service_charge.
// applies_before_tax = true reduces the taxable base; false (e.g. tip) does
// not affect tax. source_id is optional and FK-less by design -- the
// originating promotion or coupon may be deleted while historical orders
// remain valid.
message OrderLineAdjustment {
  string                    id                   = 1;
  int32                     sequence             = 2;
  string                    kind                 = 3; // discount|promotion|fee|service_charge|comp
  string                    source_type          = 4; // manual|promotion_rule|coupon|loyalty|customer_group|auto
  string                    source_id            = 5;
  string                    source_code_snapshot = 6;
  string                    name_snapshot        = 7;
  string                    reason               = 8;
  string                    calculation_type     = 9; // percentage|fixed_amount|fixed_price
  string                    calculation_value    = 10;
  string                    amount               = 11;
  bool                      applies_before_tax   = 12;
  string                    applied_by           = 13;
  google.protobuf.Timestamp applied_at           = 14;
  string                    approved_by          = 15;
}

// Order-level adjustment. Same shape as OrderLineAdjustment plus
// prorate_strategy, which controls how this adjustment is distributed to
// lines for tax purposes: pro_rata_taxable_base (typical order discount),
// pro_rata_qty (per-item fee), or no_prorate (e.g. tip -- sits on top, no
// tax impact).
message OrderAdjustment {
  string                    id                   = 1;
  int32                     sequence             = 2;
  string                    kind                 = 3; // discount|promotion|fee|service_charge|tip|delivery|rounding|comp
  string                    source_type          = 4; // manual|promotion_rule|coupon|loyalty|customer_group|auto|system
  string                    source_id            = 5;
  string                    source_code_snapshot = 6;
  string                    name_snapshot        = 7;
  string                    reason               = 8;
  string                    calculation_type     = 9;
  string                    calculation_value    = 10;
  string                    amount               = 11;
  bool                      applies_before_tax   = 12;
  string                    prorate_strategy     = 13; // pro_rata_taxable_base|pro_rata_qty|no_prorate
  string                    applied_by           = 14;
  google.protobuf.Timestamp applied_at           = 15;
  string                    approved_by          = 16;
}

message OrderLineItem {
  string                       id              = 1;
  string                       variant_id      = 2;
  string                       product_name    = 3;
  string                       variant_name    = 4;
  string                       sku             = 5;
  string                       quantity        = 6; // decimal string
  string                       unit_price      = 7;
  // tax_rate and tax_amount are aggregate snapshots: tax_rate is the combined
  // effective rate applied; tax_amount is the sum of taxes[]. discount_amount
  // is the sum of all line adjustments. They are kept for fast list/report
  // rendering; taxes[] and adjustments[] are the source of truth for audit.
  string                       tax_rate        = 8;
  string                       tax_amount      = 9;
  string                       discount_amount = 10;
  string                       line_total      = 11;
  string                       notes           = 12;
  repeated OrderLineItemTax    taxes           = 13;
  repeated OrderLineAdjustment adjustments     = 14;
}

message OrderPayment {
  string                    id                  = 1;
  string                    payment_method_id   = 2;
  string                    payment_method_name = 3;
  string                    amount              = 4;
  string                    tendered            = 5;
  string                    change_amount       = 6;
  string                    reference           = 7;
  string                    status              = 8;
  google.protobuf.Timestamp created_at          = 9;
}

message Order {
  string                     id              = 1;
  string                     order_number    = 2;
  string                     status          = 3;
  string                     subtotal        = 4;
  string                     tax_total       = 5;
  string                     discount_total  = 6;
  string                     total           = 7;
  string                     notes           = 8;
  string                     store_id        = 9;
  string                     store_name      = 10;
  string                     register_id     = 11;
  string                     user_id         = 12;
  string                     user_name       = 13;
  string                     customer_id     = 14;
  string                     customer_name   = 15;
  google.protobuf.Timestamp  created_at      = 16;
  google.protobuf.Timestamp  completed_at    = 17;
  repeated OrderLineItem     line_items      = 18;
  repeated OrderPayment      payments        = 19;
  // pos | online_store | shopify | woocommerce | manual | import
  string                     source          = 20;
  string                     external_id     = 21;
  repeated OrderAdjustment   adjustments     = 22;
}

message GetOrderRequest  { string id = 1; }
message GetOrderResponse { Order order = 1; }

// ----- CreateOrder -----------------------------------------------------------
// taxes and adjustments are optional in the request: existing clients that
// only send aggregate tax_amount/discount_amount continue to work. When the
// caller sends taxes[] / adjustments[], the server persists them as the
// authoritative breakdown and the aggregates are treated as the caller's
// pre-computed totals.
message CreateOrderLineItem {
  string                       variant_id      = 1; // optional -- empty when the variant has been deleted
  string                       product_name    = 2;
  string                       variant_name    = 3;
  string                       sku             = 4;
  string                       quantity        = 5; // decimal string
  string                       unit_price      = 6;
  string                       discount_amount = 7;
  string                       tax_rate        = 8;
  string                       tax_amount      = 9;
  string                       line_total      = 10;
  string                       notes           = 11;
  repeated OrderLineItemTax    taxes           = 12;
  repeated OrderLineAdjustment adjustments     = 13;
}

message CreateOrderPayment {
  string payment_method_id = 1;
  string amount            = 2;
  string tendered          = 3;
  string change_amount     = 4;
  string reference         = 5;
}

message CreateOrderRequest {
  // Idempotency key. source defaults to "pos" if empty.
  string                    source             = 1;
  string                    external_id        = 2; // client's local order UUID
  string                    external_source_id = 3;

  string                    order_number       = 4;
  string                    store_id           = 5; // optional — defaults to org's first store
  string                    register_id        = 6;
  string                    customer_id        = 7;
  string                    user_id            = 8; // required for source="pos"
  string                    status             = 9; // defaults to "completed"
  string                    subtotal           = 10;
  string                    tax_total          = 11;
  string                    discount_total     = 12;
  string                    total              = 13;
  string                    notes              = 14;
  google.protobuf.Timestamp completed_at       = 15;

  repeated CreateOrderLineItem line_items      = 16;
  repeated CreateOrderPayment  payments        = 17;
  repeated OrderAdjustment     adjustments     = 18;
}

message CreateOrderResponse { Order order = 1; }
