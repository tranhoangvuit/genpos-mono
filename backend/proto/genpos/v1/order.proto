syntax = "proto3";

package genpos.v1;

option go_package = "github.com/genpick/genpos-mono/backend/gen/genpos/v1;genposv1";

import "google/protobuf/timestamp.proto";

// ----- OrderService ----------------------------------------------------------
service OrderService {
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse) {}
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse) {}
  // CreateOrder accepts a completed order from a non-cloud channel (today: the
  // desk POS). Idempotent on (source, external_id) — resubmitting with the
  // same key returns the previously persisted order rather than creating a
  // duplicate. external_id is the client's local UUID.
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse) {}
}

message OrderSummary {
  string                    id              = 1;
  string                    order_number    = 2;
  string                    status          = 3;
  string                    subtotal        = 4;
  string                    tax_total       = 5;
  string                    discount_total  = 6;
  string                    total           = 7;
  string                    store_id        = 8;
  string                    store_name      = 9;
  string                    register_id     = 10;
  string                    user_id         = 11;
  string                    user_name       = 12;
  string                    customer_id     = 13;
  string                    customer_name   = 14;
  google.protobuf.Timestamp created_at      = 15;
  // pos | online_store | shopify | woocommerce | manual | import
  string                    source          = 16;
  string                    external_id     = 17;
}

message ListOrdersRequest {
  string                    store_id  = 1;
  google.protobuf.Timestamp date_from = 2;
  google.protobuf.Timestamp date_to   = 3;
}

message ListOrdersResponse {
  repeated OrderSummary orders = 1;
}

// ----- Order detail ----------------------------------------------------------
message OrderLineItem {
  string id               = 1;
  string variant_id       = 2;
  string product_name     = 3;
  string variant_name     = 4;
  string sku              = 5;
  string quantity         = 6; // decimal string
  string unit_price       = 7;
  string tax_rate         = 8;
  string tax_amount       = 9;
  string discount_amount  = 10;
  string line_total       = 11;
  string notes            = 12;
}

message OrderPayment {
  string                    id                  = 1;
  string                    payment_method_id   = 2;
  string                    payment_method_name = 3;
  string                    amount              = 4;
  string                    tendered            = 5;
  string                    change_amount       = 6;
  string                    reference           = 7;
  string                    status              = 8;
  google.protobuf.Timestamp created_at          = 9;
}

message Order {
  string                     id              = 1;
  string                     order_number    = 2;
  string                     status          = 3;
  string                     subtotal        = 4;
  string                     tax_total       = 5;
  string                     discount_total  = 6;
  string                     total           = 7;
  string                     notes           = 8;
  string                     store_id        = 9;
  string                     store_name      = 10;
  string                     register_id     = 11;
  string                     user_id         = 12;
  string                     user_name       = 13;
  string                     customer_id     = 14;
  string                     customer_name   = 15;
  google.protobuf.Timestamp  created_at      = 16;
  google.protobuf.Timestamp  completed_at    = 17;
  repeated OrderLineItem     line_items      = 18;
  repeated OrderPayment      payments        = 19;
  // pos | online_store | shopify | woocommerce | manual | import
  string                     source          = 20;
  string                     external_id     = 21;
}

message GetOrderRequest  { string id = 1; }
message GetOrderResponse { Order order = 1; }

// ----- CreateOrder -----------------------------------------------------------
message CreateOrderLineItem {
  string variant_id      = 1; // optional — empty when the variant has been deleted
  string product_name    = 2;
  string variant_name    = 3;
  string sku             = 4;
  string quantity        = 5; // decimal string
  string unit_price      = 6;
  string discount_amount = 7;
  string tax_rate        = 8;
  string tax_amount      = 9;
  string line_total      = 10;
  string notes           = 11;
}

message CreateOrderPayment {
  string payment_method_id = 1;
  string amount            = 2;
  string tendered          = 3;
  string change_amount     = 4;
  string reference         = 5;
}

message CreateOrderRequest {
  // Idempotency key. source defaults to "pos" if empty.
  string                    source             = 1;
  string                    external_id        = 2; // client's local order UUID
  string                    external_source_id = 3;

  string                    order_number       = 4;
  string                    store_id           = 5; // optional — defaults to org's first store
  string                    register_id        = 6;
  string                    customer_id        = 7;
  string                    user_id            = 8; // required for source="pos"
  string                    status             = 9; // defaults to "completed"
  string                    subtotal           = 10;
  string                    tax_total          = 11;
  string                    discount_total     = 12;
  string                    total              = 13;
  string                    notes              = 14;
  google.protobuf.Timestamp completed_at       = 15;

  repeated CreateOrderLineItem line_items      = 16;
  repeated CreateOrderPayment  payments        = 17;
}

message CreateOrderResponse { Order order = 1; }
