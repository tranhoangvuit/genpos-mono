syntax = "proto3";

package genpos.v1;

option go_package = "github.com/genpick/genpos-mono/backend/gen/genpos/v1;genposv1";

import "google/protobuf/timestamp.proto";

// ----- CatalogService --------------------------------------------------------
service CatalogService {
  // Categories
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse) {}
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse) {}
  rpc UpdateCategory(UpdateCategoryRequest) returns (UpdateCategoryResponse) {}
  rpc DeleteCategory(DeleteCategoryRequest) returns (DeleteCategoryResponse) {}

  // Products
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse) {}
  rpc GetProduct(GetProductRequest) returns (GetProductResponse) {}
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse) {}
  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse) {}
  rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse) {}

  // CSV import
  rpc ParseImportCsv(ParseImportCsvRequest) returns (ParseImportCsvResponse) {}
  rpc ImportProducts(ImportProductsRequest) returns (ImportProductsResponse) {}
}

// ----- Category types --------------------------------------------------------

message Category {
  string                    id         = 1;
  string                    org_id     = 2;
  string                    parent_id  = 3;
  string                    name       = 4;
  int32                     sort_order = 5;
  string                    color      = 6;
  string                    image_url  = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message ListCategoriesRequest {}
message ListCategoriesResponse {
  repeated Category categories = 1;
}

message CreateCategoryRequest {
  string name       = 1;
  string parent_id  = 2;
  string color      = 3;
  int32  sort_order = 4;
}
message CreateCategoryResponse {
  Category category = 1;
}

message UpdateCategoryRequest {
  string id         = 1;
  string name       = 2;
  string parent_id  = 3;
  string color      = 4;
  int32  sort_order = 5;
}
message UpdateCategoryResponse {
  Category category = 1;
}

message DeleteCategoryRequest {
  string id = 1;
}
message DeleteCategoryResponse {}

// ----- Product types ---------------------------------------------------------

message ProductOption {
  string                     id         = 1;
  string                     name       = 2;
  int32                      sort_order = 3;
  repeated ProductOptionValue values    = 4;
}

message ProductOptionValue {
  string id         = 1;
  string value      = 2;
  int32  sort_order = 3;
}

message ProductVariant {
  string          id               = 1;
  string          name             = 2;
  string          sku              = 3;
  string          barcode          = 4;
  string          price            = 5;   // decimal as string
  string          cost_price       = 6;
  bool            track_stock      = 7;
  bool            is_active        = 8;
  int32           sort_order       = 9;
  repeated string option_value_ids = 10;
}

message ProductImage {
  string id         = 1;
  string variant_id = 2;
  string url        = 3;
  int32  sort_order = 4;
}

message ProductDetail {
  string                    id           = 1;
  string                    org_id       = 2;
  string                    category_id  = 3;
  string                    name         = 4;
  string                    description  = 5;
  bool                      is_active    = 6;
  int32                     sort_order   = 7;
  repeated ProductOption    options      = 8;
  repeated ProductVariant   variants     = 9;
  repeated ProductImage     images       = 10;
  google.protobuf.Timestamp created_at   = 11;
  google.protobuf.Timestamp updated_at   = 12;
}

// ----- Product inputs (writes) ----------------------------------------------

message OptionInput {
  string          name   = 1;
  repeated string values = 2;
}

message VariantInput {
  string          name             = 1;
  string          sku              = 2;
  string          barcode          = 3;
  string          price            = 4;
  string          cost_price       = 5;
  bool            track_stock      = 6;
  bool            is_active        = 7;
  int32           sort_order       = 8;
  // References option_values by display string (zero-based index-paired with options).
  // Empty when product has no options.
  repeated string option_values    = 9;
}

message ProductImageInput {
  string url        = 1;
  int32  sort_order = 2;
}

message ProductInput {
  string                    name        = 1;
  string                    description = 2;
  string                    category_id = 3;
  bool                      is_active   = 4;
  int32                     sort_order  = 5;
  repeated OptionInput      options     = 6;
  repeated VariantInput     variants    = 7;
  repeated ProductImageInput images     = 8;
}

// ProductListItem is the row shape shown on the products list page.
message ProductListItem {
  string id             = 1;
  string name           = 2;
  string category_id    = 3;
  string category_name  = 4;
  string price          = 5; // min variant price as decimal string
  int32  variant_count  = 6;
  bool   is_active      = 7;
}

message ListProductsRequest {}
message ListProductsResponse {
  repeated ProductListItem products = 1;
}

message GetProductRequest { string id = 1; }
message GetProductResponse { ProductDetail product = 1; }

message CreateProductRequest { ProductInput product = 1; }
message CreateProductResponse { ProductDetail product = 1; }

message UpdateProductRequest {
  string       id      = 1;
  ProductInput product = 2;
}
message UpdateProductResponse { ProductDetail product = 1; }

message DeleteProductRequest { string id = 1; }
message DeleteProductResponse {}

// ----- CSV import ------------------------------------------------------------

message CsvProductRow {
  string          name          = 1;
  string          category_name = 2;
  string          description   = 3;
  string          sku           = 4;
  string          barcode       = 5;
  string          price         = 6;
  string          cost_price    = 7;
  string          is_active     = 8;
  // Per-row validation errors collected during parse.
  repeated string errors        = 9;
  // True if an existing product with this name already exists.
  bool            exists        = 10;
  string          existing_id   = 11;
}

message ParseImportCsvRequest {
  bytes csv_data = 1;
}
message ParseImportCsvResponse {
  repeated CsvProductRow rows        = 1;
  int32                  valid_count = 2;
  int32                  error_count = 3;
  repeated string        warnings    = 4;
}

message ImportProductItem {
  CsvProductRow row                = 1;
  bool          override_existing  = 2;
  string        existing_id        = 3;
}

message ImportProductsRequest {
  repeated ImportProductItem items = 1;
}
message ImportProductsResponse {
  int32            created = 1;
  int32            updated = 2;
  int32            skipped = 3;
  repeated string  errors  = 4;
}
