syntax = "proto3";

package genpos.v1;

option go_package = "github.com/genpick/genpos-mono/backend/gen/genpos/v1;genposv1";

import "google/protobuf/timestamp.proto";

// ----- GenposService ---------------------------------------------------------

service GenposService {
  rpc Ping(PingRequest) returns (PingResponse) {}
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse) {}
}

message PingRequest {}

message PingResponse {
  string message = 1;
}

message ListProductsRequest {
  string org_id    = 1;
  int32  page_size = 2;
  int32  offset    = 3;
}

message ListProductsResponse {
  repeated Product products = 1;
}

message Product {
  string                    id          = 1;
  string                    org_id      = 2;
  string                    name        = 3;
  string                    sku         = 4;
  int64                     price_cents = 5;
  bool                      active      = 6;
  google.protobuf.Timestamp created_at  = 7;
  google.protobuf.Timestamp updated_at  = 8;
}

// ----- AuthService -----------------------------------------------------------

service AuthService {
  // SignUp creates a new organization and its first admin user.
  rpc SignUp(SignUpRequest) returns (SignUpResponse) {}

  // SignIn authenticates a user by email + password and sets session cookies.
  rpc SignIn(SignInRequest) returns (SignInResponse) {}

  // SignOut revokes the refresh token and clears session cookies.
  rpc SignOut(SignOutRequest) returns (SignOutResponse) {}

  // Refresh rotates the refresh token and issues a new access token.
  rpc Refresh(RefreshRequest) returns (RefreshResponse) {}

  // Me returns the currently authenticated user (requires access cookie).
  rpc Me(MeRequest) returns (MeResponse) {}
}

message AuthUser {
  string id       = 1;
  string org_id   = 2;
  string org_slug = 3;
  string email    = 4;
  string name     = 5;
  string role     = 6;
}

message SignUpRequest {
  // Business domain slug — becomes the org slug (e.g. "mybusiness").
  string domain   = 1;
  string email    = 2;
  string password = 3;
}

message SignUpResponse {
  AuthUser user = 1;
}

message SignInRequest {
  string email       = 1;
  string password    = 2;
  bool   remember_me = 3;
}

message SignInResponse {
  AuthUser user = 1;
}

message SignOutRequest {}

message SignOutResponse {}

message RefreshRequest {}

message RefreshResponse {
  AuthUser user = 1;
}

message MeRequest {}

message MeResponse {
  AuthUser user = 1;
}
