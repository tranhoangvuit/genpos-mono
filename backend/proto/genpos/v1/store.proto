syntax = "proto3";

package genpos.v1;

option go_package = "github.com/genpick/genpos-mono/backend/gen/genpos/v1;genposv1";

import "google/protobuf/timestamp.proto";

// ----- StoreService ----------------------------------------------------------
service StoreService {
  rpc ListStoreDetails(ListStoreDetailsRequest) returns (ListStoreDetailsResponse) {}
  rpc CreateStore(CreateStoreRequest) returns (CreateStoreResponse) {}
  rpc UpdateStore(UpdateStoreRequest) returns (UpdateStoreResponse) {}
  rpc DeleteStore(DeleteStoreRequest) returns (DeleteStoreResponse) {}
}

message Store {
  string                    id         = 1;
  string                    org_id     = 2;
  string                    name       = 3;
  string                    address    = 4;
  string                    phone      = 5;
  string                    email      = 6;
  string                    timezone   = 7;
  // "active" | "inactive" | "closed"
  string                    status     = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message StoreInput {
  string name     = 1;
  string address  = 2;
  string phone    = 3;
  string email    = 4;
  string timezone = 5;
  // Used on update only; create defaults to "active".
  string status   = 6;
}

message ListStoreDetailsRequest {}
message ListStoreDetailsResponse {
  repeated Store stores = 1;
}

message CreateStoreRequest { StoreInput store = 1; }
message CreateStoreResponse { Store store = 1; }

message UpdateStoreRequest {
  string     id    = 1;
  StoreInput store = 2;
}
message UpdateStoreResponse { Store store = 1; }

message DeleteStoreRequest { string id = 1; }
message DeleteStoreResponse {}
