syntax = "proto3";

package genpos.v1;

option go_package = "github.com/genpick/genpos-mono/backend/gen/genpos/v1;genposv1";

import "google/protobuf/timestamp.proto";

// ----- PaymentMethodService --------------------------------------------------
service PaymentMethodService {
  rpc ListPaymentMethods(ListPaymentMethodsRequest) returns (ListPaymentMethodsResponse) {}
  rpc CreatePaymentMethod(CreatePaymentMethodRequest) returns (CreatePaymentMethodResponse) {}
  rpc UpdatePaymentMethod(UpdatePaymentMethodRequest) returns (UpdatePaymentMethodResponse) {}
  rpc DeletePaymentMethod(DeletePaymentMethodRequest) returns (DeletePaymentMethodResponse) {}
}

message PaymentMethod {
  string                    id         = 1;
  string                    org_id     = 2;
  string                    name       = 3;
  // "cash" | "card" | "mobile" | "bank_transfer" | "voucher" | "other"
  string                    type       = 4;
  bool                      is_active  = 5;
  int32                     sort_order = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message PaymentMethodInput {
  string name       = 1;
  string type       = 2;
  bool   is_active  = 3;
  int32  sort_order = 4;
}

message ListPaymentMethodsRequest {}
message ListPaymentMethodsResponse {
  repeated PaymentMethod methods = 1;
}

message CreatePaymentMethodRequest { PaymentMethodInput method = 1; }
message CreatePaymentMethodResponse { PaymentMethod method = 1; }

message UpdatePaymentMethodRequest {
  string             id     = 1;
  PaymentMethodInput method = 2;
}
message UpdatePaymentMethodResponse { PaymentMethod method = 1; }

message DeletePaymentMethodRequest { string id = 1; }
message DeletePaymentMethodResponse {}
