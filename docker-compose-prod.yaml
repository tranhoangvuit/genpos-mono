services:
  postgres:
    image: postgres:17
    restart: always
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-genpos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=8
      - -c
      - max_wal_senders=8
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  powersync:
    image: journeyapps/powersync-service:${POWERSYNC_VERSION:-1.14.0}
    restart: always
    ports:
      - "${POWERSYNC_PORT:-3034}:8080"
    volumes:
      - ./powersync/powersync.yaml:/config/powersync.yaml:ro
      - ./powersync/sync-rules.yaml:/config/sync-rules.yaml:ro
    command: ["start", "-c", "/config/powersync.yaml"]
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE}/genpos-backend:${BACKEND_TAG:-latest}
    restart: always
    ports:
      - "${BACKEND_PORT:-3031}:3031"
    environment:
      ENV: prod
      SERVICE_NAME: genpos
      SERVER_PORT: 3031
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_DATABASE: ${POSTGRES_DB:-genpos}
      DATABASE_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_ACCESS_TTL: ${AUTH_ACCESS_TTL:-15m}
      AUTH_REFRESH_TTL_LONG: ${AUTH_REFRESH_TTL_LONG:-720h}
      AUTH_REFRESH_TTL_SHORT: ${AUTH_REFRESH_TTL_SHORT:-24h}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
      AUTH_COOKIE_SECURE: "true"
      AUTH_FRONTEND_ORIGINS: ${AUTH_FRONTEND_ORIGINS}
      POWERSYNC_JWT_SECRET: ${POWERSYNC_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE}/genpos-frontend:${FRONTEND_TAG:-latest}
    restart: always
    ports:
      - "${FRONTEND_PORT:-3032}:3032"
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL}
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
