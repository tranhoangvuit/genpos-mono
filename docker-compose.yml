services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-3033}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-genpos_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
      - -c
      - max_wal_senders=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: creates DB roles (app_runner, app_auth, powersync_user) from
  # env passwords, then applies Atlas migrations. Runs on every `up`.
  migrate:
    build:
      context: .
      dockerfile: backend/database/bootstrap/Dockerfile
    restart: "no"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_DATABASE: ${POSTGRES_DB:-genpos_dev}
      DATABASE_SSL_MODE: disable
      BOOTSTRAP_EXTRA_DATABASES: genpos_test
    depends_on:
      postgres:
        condition: service_healthy

  powersync:
    image: journeyapps/powersync-service:latest
    restart: unless-stopped
    ports:
      - "${POWERSYNC_PORT:-3034}:8080"
    volumes:
      - ./powersync/powersync.yaml:/config/powersync.yaml
      - ./powersync/sync-rules.yaml:/config/sync-rules.yaml
    command: ["start", "-c", "/config/powersync.yaml"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3031}:3031"
    env_file:
      - ./backend/.env
    environment:
      SERVER_PORT: 3031
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      AUTH_FRONTEND_ORIGINS: http://localhost:3032,http://localhost:1420,tauri://localhost,http://tauri.localhost,https://tauri.localhost
    volumes:
      - ./backend:/app
      - backend_tmp:/app/tmp
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3032}:3032"
    environment:
      VITE_API_BASE_URL: http://localhost:3031
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_tmp:
  frontend_node_modules:
